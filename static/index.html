<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuralNumber — Digit Recognizer</title>
    <meta name="description" content="Draw a digit and let a neural network built from scratch predict it!" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <main class="container">
        <header>
            <h1 class="title">Neural<span class="accent">Number</span></h1>
            <p class="subtitle">Draw a digit from 0 – 9 and watch your neural network predict it in real time.</p>
        </header>

        <div class="app-layout">
            <!-- Drawing Panel -->
            <div class="panel draw-panel">
                <p class="panel-label">✏️ Draw Here</p>
                <canvas id="canvas" width="280" height="280"></canvas>
                <div class="canvas-actions">
                    <button id="clearBtn" class="btn btn-secondary">Clear</button>
                    <button id="predictBtn" class="btn btn-primary">Predict →</button>
                </div>
            </div>

            <!-- Result Panel -->
            <div class="panel result-panel">
                <p class="panel-label">🧠 Prediction</p>
                <div class="prediction-box" id="predictionBox">
                    <span class="digit-display" id="digitDisplay">?</span>
                    <span class="confidence" id="confidenceDisplay"></span>
                </div>
                <div class="bar-chart" id="barChart">
                    <!-- bars generated by JS -->
                </div>
            </div>
        </div>
    </main>

    <script src="/static/script.js"></script>
</body>
</html>
