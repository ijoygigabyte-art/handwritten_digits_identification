<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuralNumber — Digit Recognizer</title>
    <meta name="description" content="Draw a digit and let a neural network built from scratch predict it." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
    <main class="container">
        <header>
            <div>
                <h1 class="title">NeuralNumber <span class="title-tag">Model 98</span></h1>
                <p class="subtitle">Handwritten Digit Recognition Instrument</p>
            </div>
            <div class="theme-toggle-wrap">
                <button id="themeToggle">Day</button>
            </div>
        </header>

        <div class="app-layout">
            <!-- Input Section -->
            <div class="panel draw-panel">
                <p class="panel-label">Input · Drawing Surface</p>
                <div class="canvas-wrap">
                    <canvas id="canvas" width="280" height="280"></canvas>
                </div>
                <div class="canvas-actions">
                    <button id="clearBtn" class="btn btn-secondary">⟲ Reset</button>
                    <button id="predictBtn" class="btn btn-primary">▶ Classify</button>
                </div>
            </div>

            <!-- Output Section -->
            <div class="panel result-panel">
                <p class="panel-label">Output · Classification</p>
                <div class="prediction-box" id="predictionBox">
                    <span class="digit-display idle" id="digitDisplay">—</span>
                    <span class="confidence" id="confidenceDisplay"></span>
                </div>
                <p class="panel-label">Distribution</p>
                <div class="bar-chart" id="barChart">
                    <!-- bars generated by JS -->
                </div>
            </div>
        </div>

        <div class="status-strip">
            <span><span class="status-dot"></span>Ready</span>
            <span>Arch: 784 → 256 → 128 → 10</span>
            <span>Optim: Adam · Aug: ±2px shift</span>
            <span>Val: 98.7%</span>
        </div>
    </main>

    <script src="/static/script.js"></script>
</body>

</html>
